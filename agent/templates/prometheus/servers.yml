- targets:

## for job, servers in cluster.jobs.items() ##
- targets:
    ##- for server in servers ##
    - "{{ server }}"
    ##- endfor ##
  labels:
    cluster: "{{ cluster.name }}"
    job: "{{ job }}"
    __metrics_path__: /metrics/{{ job }}
## endfor ##

## for job, proxied_servers in cluster.proxied_jobs.items() ##
##- for proxy, servers in proxied_servers.items() ##
- targets:
    ##- for server in servers ##
    - "{{ server }}"
    ##- endfor ##
  labels:
    cluster: "{{ cluster.name }}"
    job: "{{ job }}"
    base_path: /metrics/{{ job }}
    proxy_host: "{{ proxy }}"
##- endfor ##
## endfor ##
